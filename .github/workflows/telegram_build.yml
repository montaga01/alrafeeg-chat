name: Shorebird APK to Telegram

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build_and_send:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 checkout code
        uses: actions/checkout@v4

      - name: 🚀 setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🐦 setup shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: 📦 install dependencies
        run: flutter pub get

      - name: 🏗️ build and upload shorebird release
        run: |
          yes | shorebird release android --artifact apk || echo "⚠️ واصل"
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: 📦 upload artifact to github
        if: always() # عشان يرفع حتى لو الخطوات الفاتت فيها تنبيهات
        uses: actions/upload-artifact@v4
        with:
          name: Alrafeeg-Builds
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7

      - name: 📤 send to telegram
        if: success()
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //')
          APK_ORIGINAL=$(find . -name "*.apk" | grep -v "unsigned" | head -n 1)
          if [ -n "$APK_ORIGINAL" ]; then
            NEW_NAME="Alrafeeg_v${VERSION}.apk"
            cp "$APK_ORIGINAL" "$NEW_NAME"
            curl -F document=@"$NEW_NAME" \
                 -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                 -F caption="🚀 نسخة الرفيق v$VERSION" \
                 https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

