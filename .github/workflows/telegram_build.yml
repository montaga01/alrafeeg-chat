name: shorebird-patch-only

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 🐦 Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1

      - name: 📦 Install
        run: flutter pub get

      - name: ⚡ Run Patch
        # هذا الأمر يرفع التحديث لآخر نسخة مرفوعة في الكونسول (1.0.2+4)
        run: yes | shorebird patch android --release-version=latest
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: 📢 Telegram Notification
        if: success()
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | xargs)
          curl -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
               -F text="✅ تم رفع الباتش الهوائي بنجاح!
📦 الإصدار: $VERSION
✨ التعديلات ستظهر للمستخدمين عند إغلاق التطبيق وفتحه مجدداً." \
               https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
