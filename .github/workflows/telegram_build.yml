name: Shorebird APK to Telegram

on:
  push:
    branches:
      - main

jobs:
  build_and_send:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود
      - name: 📂 checkout code
        uses: actions/checkout@v4

      # 2. إعداد فلاتر
      - name: 🚀 setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3. إعداد شوربيرد
      - name: 🐦 setup shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      # 4. تحميل المكتبات
      - name: 📦 install dependencies
        run: flutter pub get

      # 5. بناء الـ APK (استخدام dry-run لتجنب خطأ المرة الفاتت)
      - name: 🏗️ build shorebird apk
        run: |
          # الخيار --dry-run يبني الـ APK ويقوم بالتحقق بدون الرفع النهائي
          shorebird release android --artifact apk --dry-run
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      # 6. إرسال الملف إلى تلجرام (مع البحث الذكي عن الملف)
      - name: 📤 send to telegram
        run: |
          echo "🔍 جاري البحث عن ملف الـ APK..."
          
          # محاولة إيجاد الملف في المسار الافتراضي لشوربيرد
          APK_PATH=$(find build -name "app-release.apk" | head -n 1)
          
          if [ -n "$APK_PATH" ]; then
            echo "✅ تم العثور على الملف في: $APK_PATH"
            curl -F document=@"$APK_PATH" \
                 -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                 -F caption="✅ تم بناء نسخة الرفيق بنجاح! 🚀" \
                 https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
          else
            echo "❌ للأسف لم يتم العثور على ملف APK"
            exit 1
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
