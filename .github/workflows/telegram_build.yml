name: Shorebird Push Patch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  patch_and_notify:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود
      - name: 📂 checkout code
        uses: actions/checkout@v4

      # 2. إعداد فلاتر
      - name: 🚀 setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3. إعداد شوربيرد
      - name: 🐦 setup shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      # 4. تحميل المكتبات
      - name: 📦 install dependencies
        run: flutter pub get

      # 5. رفع الباتش (التحديث الهوائي)
      - name: 🚀 push shorebird patch
        run: |
          # نستخدم yes | للموافقة التلقائية
          # نستخدم --release-version=latest لربط التحديث بآخر نسخة موجودة في المنصة
          yes | shorebird patch android --release-version=latest
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      # 6. إشعار تلجرام (بدون APK لأن الباتش هوائي)
      - name: 📢 notify telegram
        if: success()
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //')
          curl -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
               -F text="✅ تم رفع تحديث هوائي (Patch) جديد بنجاح!
               
📦 الإصدار المستهدف: $VERSION
✨ التعديلات ستظهر للمستخدمين عند إغلاق التطبيق وفتحه مجدداً." \
               https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
