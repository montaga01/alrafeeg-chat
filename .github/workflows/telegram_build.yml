name: Shorebird APK to Telegram

on:
  push:
    branches:
      - main
  workflow_dispatch: # أضفت ليك الخيار ده عشان تقدر تشغله يدوياً من الموقع لو حبيت

jobs:
  build_and_send:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود
      - name: 📂 checkout code
        uses: actions/checkout@v4

      # 2. إعداد فلاتر
      - name: 🚀 setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3. إعداد شوربيرد
      - name: 🐦 setup shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      # 4. تحميل المكتبات
      - name: 📦 install dependencies
        run: flutter pub get

      # 5. بناء الـ APK (التعامل مع النسخة المكررة بحكمة)
      - name: 🏗️ build shorebird apk
        run: |
          # نستخدم || true لضمان الانتقال لخطوة الإرسال حتى لو النسخة موجودة مسبقاً
          shorebird release android --artifact apk --dry-run --token="${{ secrets.SHOREBIRD_TOKEN }}" || echo "⚠️ النسخة موجودة مسبقاً لكن سنواصل الإرسال..."
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      # 6. إرسال الملف لتلجرام (البحث الشامل)
      - name: 📤 send to telegram
        run: |
          echo "🔍 جاري البحث عن ملف الـ APK..."
          
          # بنبحث في كل مجلد build عن أي ملف apk
          # وبنستبعد الملفات الصغيرة أو غير الضرورية
          APK_PATH=$(find build/app/outputs/flutter-apk -name "*.apk" | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
             APK_PATH=$(find build -name "app-release.apk" | head -n 1)
          fi

          if [ -n "$APK_PATH" ]; then
            echo "✅ تم العثور على الملف: $APK_PATH"
            curl -v -F document=@"$APK_PATH" \
                 -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                 -F caption="✅ نسخة الرفيق جاهزة يا هندسة! 🚀" \
                 https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
          else
            echo "❌ لم يتم العثور على APK"
            exit 1
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

