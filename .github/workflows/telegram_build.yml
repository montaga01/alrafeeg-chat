name: Shorebird Push Patch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 checkout code
        uses: actions/checkout@v4

      - name: 🚀 setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🐦 setup shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: 📦 install dependencies
        run: flutter pub get

      # الخطوة الجوهرية: رفع التحديث الهوائي
      - name: 🚀 push shorebird patch
        run: |
          # نستخدم yes | للموافقة التلقائية على رفع التحديث
          # أمر patch بيرفع التعديلات فقط لآخر نسخة (Release) مرفوعة بنفس رقم الإصدار
          yes | shorebird patch android --force || echo "⚠️ فشل إرسال الباتش، تأكد أنك رفعت Release بنفس رقم الإصدار أولاً"
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: 📢 notify telegram
        if: success()
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //')
          curl -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
               -F text="🚀 تم إرسال تحديث هوائي (Patch) جديد بنجاح!
               
📦 النسخة المستهدفة: $VERSION
✨ التعديلات ستظهر للمستخدمين عند إعادة تشغيل التطبيق." \
               https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
