name: Shorebird APK to Telegram

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_send:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 checkout code
        uses: actions/checkout@v4

      - name: 🚀 setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🐦 setup shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: 📦 install dependencies
        run: flutter pub get

      # الخطوة الأهم: بناء Shorebird مع معالجة رقم النسخة المكرر
      - name: 🏗️ build shorebird apk
        run: |
          # لاحظ هنا شلنا خيار --token لأنه بيعمل مشكلة
          # واستخدمنا الـ env اللي تحت بدله، وهو ده الأصح تقنياً
          shorebird release android --artifact apk --dry-run || echo "⚠️ النسخة موجودة مسبقاً، سأقوم بإرسال الـ APK المني حالاً"
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: 📤 send to telegram
        run: |
          echo "🔍 جاري البحث عن ملف الـ APK..."
          
          # البحث عن الملف اللي بناه شوربيرد (بيدعم التحديث الهوائي)
          APK_PATH=$(find build -name "app-release.apk" | head -n 1)
          
          if [ -n "$APK_PATH" ]; then
            echo "✅ تم العثور على ملف شوربيرد: $APK_PATH"
            curl -v -F document=@"$APK_PATH" \
                 -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                 -F caption="✅ نسخة الرفيق (تدعم التحديث الهوائي) 🚀" \
                 https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
          else
            echo "❌ فشل العثور على الملف"
            exit 1
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
