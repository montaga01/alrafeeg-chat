name: shorebird-ultra-smart

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: shorebirdtech/setup-shorebird@v1

      - name: smart-check
        id: check
        run: |
          # 1. استخراج الإصدار الكامل (مثلاً 1.0.2+4)
          FULL_VER=$(grep version: pubspec.yaml | sed 's/version: //')
          echo "target=$FULL_VER" >> $GITHUB_OUTPUT
          
          # 2. فحص دقيق جداً في قائمة الريليز
          # بنبحث عن الرقم الكامل مع الزائد عشان نكون دقيقين
          if shorebird releases list | grep -q "$FULL_VER"; then
            echo "mode=patch" >> $GITHUB_OUTPUT
            echo "✅ النسخة موجودة.. حنعمل Patch"
          else
            echo "mode=release" >> $GITHUB_OUTPUT
            echo "🏗️ نسخة جديدة.. حنعمل Release"
          fi
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - run: flutter pub get

      - name: execute-action
        run: |
          if [ "${{ steps.check.outputs.mode }}" == "release" ]; then
            yes | shorebird release android --artifact apk
          else
            yes | shorebird patch android --release-version=latest
          fi
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: telegram-notify
        if: success()
        run: |
          VER=${{ steps.check.outputs.target }}
          if [ "${{ steps.check.outputs.mode }}" == "release" ]; then
            APK=$(find . -name "*.apk" | grep -v unsigned | head -n 1)
            # تغيير الاسم ليكون واضح في تلجرام
            NAME="Alrafeeg_v${VER}.apk"
            cp "$APK" "$NAME"
            curl -F document=@"$NAME" -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -F caption="🏗️ ريليز جديد: $VER" https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
          else
            curl -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -F text="✅ باتش هوائي تم بنجاح للإصدار: $VER" https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
