name: shorebird-smart-ci

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: shorebirdtech/setup-shorebird@v1

      - run: flutter pub get

      - name: check-version
        id: check
        run: |
          FULL_VER=$(grep version: pubspec.yaml | sed 's/version: //')
          BASE_VER=$(echo $FULL_VER | cut -d+ -f1)
          echo target=$FULL_VER >> $GITHUB_OUTPUT
          if shorebird releases list | grep -q $BASE_VER; then
            echo mode=patch >> $GITHUB_OUTPUT
          else
            echo mode=release >> $GITHUB_OUTPUT
          fi
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: execute
        run: |
          if [ ${{ steps.check.outputs.mode }} == release ]; then
            yes | shorebird release android --artifact apk
          else
            yes | shorebird patch android --release-version=latest
          fi
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: telegram
        if: success()
        run: |
          VER=${{ steps.check.outputs.target }}
          if [ ${{ steps.check.outputs.mode }} == release ]; then
            APK=$(find . -name *.apk | grep -v unsigned | head -n 1)
            NAME=Alrafeeg_v$VER.apk
            cp $APK $NAME
            curl -F document=@$NAME -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -F caption=Release_$VER https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
          else
            curl -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -F text=Patch_$VER_Done https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
