name: Shorebird APK to Telegram

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_send:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 checkout code
        uses: actions/checkout@v4

      - name: 🚀 setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🐦 setup shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: 📦 install dependencies
        run: flutter pub get

      # 5. بناء الرفع الفعلي باستخدام تقنية yes لتخطي التأكيدات
      - name: 🏗️ build and upload shorebird release
        run: |
          # نستخدم yes | لمحاكاة ضغط حرف y لكل أسئلة شوربيرد (مثل التأكيد على الرفع)
          yes | shorebird release android --artifact apk || echo "⚠️ حدث تنبيه لكن سنحاول المواصلة"
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      # 6. البحث عن الـ APK وإرساله لتلجرام
      - name: 📤 send to telegram
        run: |
          echo "🔍 جاري البحث الشامل عن ملف الـ APK..."
          
          # بحث عميق في كل المجلدات عن أي ملف APK تم إنتاجه
          APK_PATH=$(find . -name "*.apk" | grep -v "unsigned" | head -n 1)
          
          if [ -n "$APK_PATH" ]; then
            echo "✅ تم العثور على الملف: $APK_PATH"
            curl -v -F document=@"$APK_PATH" \
                 -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                 -F caption="✅ نسخة الرفيق (جاهزة للتحديث الهوائي) 🚀" \
                 https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
          else
            echo "❌ للأسف لم يتم بناء ملف APK، راجع Logs خطوة البناء"
            exit 1
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
