name: test-ssh-connection

on:
  workflow_dispatch: # تشغيل يدوي فقط للتجربة

jobs:
  test_ssh:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          # قراءة المفتاح الخاص من الـ Secrets وتحويله لملف
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 --decode > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # إضافة السيرفر للملفات المعروفة لتجنب رسالة التأكيد
          ssh-keyscan -H 173.214.173.203 >> ~/.ssh/known_hosts

      - name: 🚀 Run Test Command on Server
        run: |
          # محاولة الدخول للسيرفر وتنفيذ أمر عرض الملفات
          ssh -i ~/.ssh/id_rsa root@173.214.173.203 "ls -la && echo '✅ الاتصال بالسيرفر ناجح يا هندسة!'"
          