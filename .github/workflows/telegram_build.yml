name: Build Web + Smart Shorebird Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 🐦 Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1

      - name: 📦 Get Flutter packages
        run: flutter pub get

      # ========== 1. بناء الويب ورفعه للسيرفر ==========
      - name: 🌐 Build Web
        run: flutter build web --release

      - name: 🚀 Deploy Web to Server
        run: |
          cd build/web && zip -r ../../web-web.zip . && cd ../..
          echo "$SSH_PRIVATE_KEY" | base64 --decode > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=no web-web.zip root@173.214.173.203:/root/
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no root@173.214.173.203 << 'SERVER_EOF'
            rm -rf ~/alrafeeg_api/test/*
            mkdir -p ~/alrafeeg_api/temp_web/
            unzip -o /root/web-web.zip -d ~/alrafeeg_api/temp_web/
            cp -r ~/alrafeeg_api/temp_web/* ~/alrafeeg_api/test/
            rm -rf ~/alrafeeg_api/temp_web/
            mv /root/web-web.zip /root/web-web-$(date +%Y%m%d-%H%M%S).zip
          SERVER_EOF
          rm -f /tmp/id_rsa
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      # ========== 2. آلية المقارنة الذكية للأندرويد ==========
      - name: 🧠 Smart Comparison Logic
        id: check
        run: |
          # 1. اكتب يدوياً هنا آخر إصدار رفعته في Shorebird Console
          LATEST_ON_SHOREBIRD="1.0.2+4"
          
          # 2. استخراج الإصدار الحالي من ملف pubspec.yaml
          CURRENT_APP_VER=$(grep version: pubspec.yaml | sed 's/version: //' | xargs)
          
          echo "النسخة في السيرفر: $LATEST_ON_SHOREBIRD"
          echo "النسخة في الكود حالياً: $CURRENT_APP_VER"
          echo "target=$CURRENT_APP_VER" >> $GITHUB_OUTPUT

          # 3. المقارنة واتخاذ القرار
          if [ "$CURRENT_APP_VER" == "$LATEST_ON_SHOREBIRD" ]; then
            echo "mode=patch" >> $GITHUB_OUTPUT
            echo "المطابقة: نفس النسخة -> تنفيذ PATCH"
          else
            echo "mode=release" >> $GITHUB_OUTPUT
            echo "المطابقة: نسخة جديدة -> تنفيذ RELEASE"
          fi

      # ========== 3. تنفيذ أمر Shorebird بناءً على القرار ==========
      - name: 🏗️ Shorebird Execute
        run: |
          if [ "${{ steps.check.outputs.mode }}" == "release" ]; then
            yes | shorebird release android --artifact apk
          else
            yes | shorebird patch android --release-version=latest
            # بناء APK عادي بعد الباتش ليتم رفعه كـ Artifact للتحميل اليدوي إذا أردت
            flutter build apk --release
          fi
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      # ========== 4. إشعار تلجرام ==========
      - name: 📢 Telegram Notification
        if: success()
        run: |
          VER=${{ steps.check.outputs.target }}
          MODE=${{ steps.check.outputs.mode }}
          
          if [ "$MODE" == "release" ]; then
            APK=$(find build/app/outputs/flutter-apk/ -name "*.apk" | grep -v unsigned | head -n 1)
            NAME="Alrafeeg_v${VER}.apk"
            cp "$APK" "$NAME"
            curl -F document=@"$NAME" \
                 -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                 -F caption="🏗️ ريليز أندرويد + ويب جديد!
📦 الإصدار: $VER" \
                 https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
          else
            curl -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                 -F text="✅ تم تحديث الويب وعمل باتش للأندرويد بنجاح!
📦 الإصدار الحالي: $VER" \
                 https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    # ========== 5. حفظ الملفات (Artifacts) ==========
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - web-web.zip