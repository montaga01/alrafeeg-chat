name: shorebird-smart-system

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  shorebird_task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: shorebirdtech/setup-shorebird@v1

      - name: 🧠 Smart Logic
        id: check
        run: |
          # 1. استخراج النسخة من pubspec
          FULL_VER=$(grep version: pubspec.yaml | sed 's/version: //')
          echo "target=$FULL_VER" >> $GITHUB_OUTPUT
          
          # 2. فحص هل النسخة موجودة فعلاً؟
          # استخدمنا --json وسحبنا الـ version عشان الدقة
          EXISTING_RELEASES=$(shorebird releases list --json | grep -o "$FULL_VER" || true)
          
          if [ "$EXISTING_RELEASES" == "$FULL_VER" ]; then
            echo "decision=patch" >> $GITHUB_OUTPUT
            echo "✅ الإصدار $FULL_VER موجود.. سنقوم بعمل Patch"
          else
            echo "decision=release" >> $GITHUB_OUTPUT
            echo "🏗️ إصدار جديد $FULL_VER.. سنقوم بعمل Release"
          fi
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - run: flutter pub get

      - name: 🚀 Execute Action
        run: |
          if [ "${{ steps.check.outputs.decision }}" == "release" ]; then
            yes | shorebird release android --artifact apk
          else
            yes | shorebird patch android --release-version=latest
          fi
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: 📢 Notify Telegram
        if: success()
        run: |
          VER=${{ steps.check.outputs.target }}
          DECISION=${{ steps.check.outputs.decision }}
          
          if [ "$DECISION" == "release" ]; then
            APK=$(find . -name "*.apk" | grep -v unsigned | head -n 1)
            NAME="Alrafeeg_v${VER}.apk"
            cp "$APK" "$NAME"
            curl -F document=@"$NAME" \
                 -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                 -F caption="🏗️ نسخة Release جديدة: $VER" \
                 https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
          else
            curl -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                 -F text="✅ تم رفع الباتش الهوائي بنجاح للإصدار: $VER" \
                 https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
