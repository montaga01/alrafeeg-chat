name: shorebird-smart-ci

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: shorebirdtech/setup-shorebird@v1

      - name: 🧠 Smart Logic
        id: check
        run: |
          # 1. استخراج الإصدار من pubspec
          FULL_VER=$(grep version: pubspec.yaml | sed 's/version: //')
          echo "target=$FULL_VER" >> $GITHUB_OUTPUT
          
          # 2. فحص الإصدار (استخدمنا grep -w للبحث عن الكلمة بالكامل)
          # إذا وجد الإصدار في القائمة، سيجعل النتيجة patch
          if shorebird releases list | grep -q "$FULL_VER"; then
            echo "mode=patch" >> $GITHUB_OUTPUT
            echo "Decision: PATCH (Version $FULL_VER already exists)"
          else
            echo "mode=release" >> $GITHUB_OUTPUT
            echo "Decision: RELEASE (New version $FULL_VER)"
          fi
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - run: flutter pub get

      - name: 🚀 Execute Action
        run: |
          # تأكدنا من استخدام المتغير الخارج من الخطوة السابقة
          if [ "${{ steps.check.outputs.mode }}" == "release" ]; then
            yes | shorebird release android --artifact apk
          else
            yes | shorebird patch android --release-version=latest
          fi
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: 📢 Notify Telegram
        if: success()
        run: |
          VER=${{ steps.check.outputs.target }}
          MODE=${{ steps.check.outputs.mode }}
          
          if [ "$MODE" == "release" ]; then
            APK=$(find . -name "*.apk" | grep -v unsigned | head -n 1)
            NAME="Alrafeeg_v${VER}.apk"
            cp "$APK" "$NAME"
            curl -F document=@"$NAME" \
                 -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                 -F caption="🏗️ ريليز جديد: $VER" \
                 https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
          else
            curl -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                 -F text="✅ تم رفع الباتش الهوائي بنجاح للإصدار: $VER" \
                 https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
