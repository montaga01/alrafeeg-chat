name: shorebird-process

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build_job:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: flutter-setup
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: shorebird-setup
        uses: shorebirdtech/setup-shorebird@v1

      - name: pub-get
        run: flutter pub get

      # ==========================================
      # منطقة التعديل الرئيسية (Release أو Patch)
      # ==========================================
      - name: shorebird-action
        # لتشغيل الباتش لاحقاً: غير السطر اللي تحت لـ: yes | shorebird patch android --release-version=latest
        run: yes | shorebird release android --artifact apk
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      # ==========================================
      # منطقة تسمية الملف وإرساله لتلجرام
      # ==========================================
      - name: telegram-send
        if: success()
        run: |
          # 1. البحث عن الملف الأصلي
          ORIGINAL_APK=$(find . -name "*.apk" | grep -v "unsigned" | head -n 1)
          
          if [ -n "$ORIGINAL_APK" ]; then
            # 2. استخراج رقم الإصدار من pubspec.yaml تلقائياً
            VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //')
            
            # 3. تسمية الملف باسم واضح (تقدر تغير Alrafeeg لأي اسم تحبه)
            NEW_NAME="Alrafeeg_v${VERSION}.apk"
            cp "$ORIGINAL_APK" "$NEW_NAME"
            
            # 4. الإرسال لتلجرام بالاسم الجديد
            curl -F document=@"$NEW_NAME" \
                 -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                 -F caption="🚀 تم بناء نسخة جديدة بنجاح
📦 الإصدار: $VERSION" \
                 https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
          else
            echo "⚠️ لم يتم العثور على ملف APK (ربما تم تشغيل Patch فقط)"
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
