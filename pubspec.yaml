name: alrafeeq
description: تطبيق الرفيق للدردشة - تطبيق محادثات فوري يعمل على أندرويد والويب
publish_to: 'none'
version: 1.0.5+7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── UI ──
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # ── Network ──
  http: ^1.2.0
  web_socket_channel: ^2.4.0

  # ── Storage ──
  shared_preferences: ^2.2.2

  # ── Localisation / Date ──
  intl: ^0.20.2

  # ── State Management ──
  # مطلوب لـ ThemeProvider و PresenceProvider
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - shorebird.yaml
