workflows:
  shorebird-workflow:
    name: Shorebird Android Build & Release
    max_build_duration: 60
    instance_type: mac_mini_m1 # أو linux حسب توفر الباقة
    environment:
      groups:
        - shorebird_credentials # تأكد من إضافة SHOREBIRD_TOKEN هنا في موقع Codemagic
      vars:
        FLUTTER_VERSION: "stable"
    scripts:
      - name: Install Shorebird
        script: |
          # تثبيت أداة Shorebird في بيئة Codemagic
          curl https://install.shorebird.dev | bash
          echo "export PATH=$HOME/.shorebird/bin:$PATH" >> $GITHUB_PATH

      - name: Shorebird Login and Init
        script: |
          export PATH="$HOME/.shorebird/bin:$PATH"
          
          # التأكد من وجود التوكن
          if [ -z "$SHOREBIRD_TOKEN" ]; then
            echo "❌ SHOREBIRD_TOKEN is missing in Environment Variables!"
            exit 1
          fi

          # تسجيل الدخول
          shorebird login --auth-token "$SHOREBIRD_TOKEN"

          # تهيئة المشروع (إذا كان موجوداً سيتخطى، وإذا لم يكن سيقوم بإنشائه)
          # نستخدم --force لضمان الاستمرار
          shorebird init --force

      - name: Shorebird Build and Release
        script: |
          export PATH="$HOME/.shorebird/bin:$PATH"
          
          # بناء نسخة الـ APK ورفعها كـ Release أساسي
          # ملاحظة: يمكنك تغيير apk إلى aab إذا كنت ترفع للمتجر
          shorebird release android --artifact apk --flutter-version $FLUTTER_VERSION

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - shorebird.yaml # لحفظ نسخة من الملف الذي يحتوي على الـ App ID