workflows:
  shorebird-initial-setup:
    name: Shorebird First Time Setup (App ID Generator)
    max_build_duration: 60
    environment:
      groups:
        - deployment # تأكد أن SHOREBIRD_TOKEN موجود في هذا الجروب في Codemagic
      flutter: stable

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install Shorebird CLI
        script: |
          # 1. تحميل وتثبيت Shorebird
          curl --proto '=https' -fLsS https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh -o /tmp/install_shorebird.sh
          bash /tmp/install_shorebird.sh
          
          # 2. إضافة المسار لبيئة Codemagic بشكل صحيح
          echo "$HOME/.shorebird/bin" >> $CM_EXPORT_PATH
          
          # 3. تفعيل المسار في السكربت الحالي للتأكد من الجاهزية
          export PATH="$HOME/.shorebird/bin:$PATH"
          shorebird --version

      - name: Shorebird Init and Build
        script: |
          # تفعيل المسار
          export PATH="$HOME/.shorebird/bin:$PATH"
          
          # التحقق من وجود التوكن (إجباري)
          if [ -z "$SHOREBIRD_TOKEN" ]; then
            echo "❌ خطأ: SHOREBIRD_TOKEN غير موجود في إعدادات Codemagic (Environment Variables)!"
            exit 1
          fi

          # 1. إنشاء التطبيق في حسابك تلقائياً
          # هذا الأمر سينشئ ملف shorebird.yaml داخل حاوية البناء
          shorebird init --non-interactive --token "$SHOREBIRD_TOKEN"
          
          # 2. طباعة محتوى الملف لرؤية الـ App ID في الـ Logs (مهم جداً لنسخه)
          echo "------------------------------------------------"
          echo "✅ تم إنشاء التطبيق بنجاح! انسخ المعرف التالي وضعه في ملفك يدوياً:"
          cat shorebird.yaml
          echo "------------------------------------------------"
          
          # 3. بناء أول نسخة (Release) ورفعها للسيرفر
          # ملاحظة: هذه النسخة ضرورية جداً لتأسيس نظام التحديثات الهوائية
          shorebird release android --flutter-version stable --token "$SHOREBIRD_TOKEN" --force

    artifacts:
      - build/app/outputs/flutter-apk/*.apk