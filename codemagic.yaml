workflows:
  android-web-shorebird:
    name: Build Web + Shorebird Android OTA
    max_build_duration: 60
    environment:
      groups:
        - deployment
      flutter: stable

    cache:
      cache_paths:
        - $HOME/.shorebird

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      # ========== 1. بناء الويب ورفعه ==========
      - name: Build Web
        script: flutter build web --release

      - name: Deploy Web to Server
        script: |
          cd build/web && zip -r ../../web-web.zip . && cd ../..
          echo "$SSH_PRIVATE_KEY" | base64 --decode > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=no web-web.zip root@173.214.173.203:/root/
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no root@173.214.173.203 << 'SERVER_EOF'
            rm -rf ~/alrafeeg_api/test/*
            mkdir -p ~/alrafeeg_api/temp_web/
            unzip -o /root/web-web.zip -d ~/alrafeeg_api/temp_web/
            cp -r ~/alrafeeg_api/temp_web/* ~/alrafeeg_api/test/
            rm -rf ~/alrafeeg_api/temp_web/
            mv /root/web-web.zip /root/web-web-$(date +%Y%m%d-%H%M%S).zip
          SERVER_EOF
          rm -f /tmp/id_rsa

      # ========== 2. إعداد Shorebird ==========
      - name: Setup Shorebird CLI
        script: |
          export PATH="$HOME/.shorebird/bin:$PATH"
          echo "export PATH=$HOME/.shorebird/bin:$PATH" >> $BASH_ENV
          if ! command -v shorebird &> /dev/null; then
            curl --proto '=https' -fLsS https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh -o /tmp/install_shorebird.sh
            bash /tmp/install_shorebird.sh
          fi
          shorebird --version

      # ========== 3. بناء الأندرويد (النسخة المتوافقة مع OTA) ==========
      - name: Shorebird Build Android
        script: |
          export PATH="$HOME/.shorebird/bin:$PATH"
          
          # 1. بناء الـ APK باستخدام صيغة الـ Proxy لضمان قبول الأمر
          echo "🔨 جاري بناء الـ APK..."
          shorebird build apk -- --release

          # 2. نسخ الملف فوراً قبل أن يقوم أمر الـ Patch بأي عمليات تنظيف
          mkdir -p build/outputs/apk
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-release.apk build/outputs/apk/alrafeeg-app.apk
            echo "✅ تم تجهيز ملف الـ APK بنجاح"
          else
            echo "❌ فشل العثور على ملف الـ APK"
          fi

          # 3. تنفيذ الـ Patch
          echo "🔄 جاري معالجة التحديث الهوائي..."
          shorebird patch android --release-version=latest

    artifacts:
      - build/outputs/apk/alrafeeg-app.apk
      - build/app/outputs/bundle/release/app-release.aab
      - web-web.zip