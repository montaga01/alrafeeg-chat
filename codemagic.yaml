workflows:
  shorebird-workflow:
    name: Shorebird Android Build (Fast Mode)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - deployment # تأكد من وجود SHOREBIRD_TOKEN في هذه المجموعة
      vars:
        FLUTTER_VERSION: "stable"
    
    # ميزة الكاش: تخزين مجلد Shorebird ومجلد Pub لتقليل زمن التحميل
    cache:
      cache_paths:
        - $HOME/.shorebird # تخزين أداة Shorebird ومحركها
        - $HOME/.pub-cache # تخزين مكتبات فلاتر (اختياري لسرعة أكبر)

    scripts:
      - name: Install Shorebird (With Connectivity Check)
        script: |
          # التحقق إذا كانت Shorebird موجودة بالفعل في الكاش
          if [ ! -d "$HOME/.shorebird" ]; then
            echo "Installing Shorebird for the first time..."
            curl --retry 3 --retry-delay 5 https://install.shorebird.dev | bash
          else
            echo "Shorebird found in cache, skipping installation."
          fi
          
          # إضافة المسار لبيئة Codemagic
          echo "export PATH=$HOME/.shorebird/bin:\$PATH" >> $CM_ENV_VARS_FILE

      - name: Shorebird Login and Init
        script: |
          export PATH="$HOME/.shorebird/bin:$PATH"
          
          if [ -z "$SHOREBIRD_TOKEN" ]; then
            echo "❌ SHOREBIRD_TOKEN is missing!"
            exit 1
          fi

          shorebird login --auth-token "$SHOREBIRD_TOKEN"
          shorebird init --force

      - name: Shorebird Build and Release
        script: |
          export PATH="$HOME/.shorebird/bin:$PATH"
          
          # بناء APK وإرساله كـ Release
          shorebird release android --artifact apk --flutter-version $FLUTTER_VERSION

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - shorebird.yaml