workflows:
  android-telegram-upload:
    name: Build APK and Send to Telegram
    max_build_duration: 30
    environment:
      groups:
        - deployment # تأكد أن التوكنات موجودة في هذه المجموعة
      vars:
        TELEGRAM_BOT_TOKEN: "أدخل_توكن_البوت_هنا"
        TELEGRAM_CHAT_ID: "أدخل_أيدي_الدردشة_هنا"
      flutter: stable

    cache:
      cache_paths:
        - $HOME/.shorebird

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Setup Shorebird CLI
        script: |
          export PATH="$HOME/.shorebird/bin:$PATH"
          echo "export PATH=$HOME/.shorebird/bin:$PATH" >> $BASH_ENV
          if ! command -v shorebird &> /dev/null; then
            curl --proto '=https' -fLsS https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh -o /tmp/install_shorebird.sh
            bash /tmp/install_shorebird.sh
          fi

      - name: Shorebird Build APK
        script: |
          export PATH="$HOME/.shorebird/bin:$PATH"
          # بناء الـ APK المتوافق مع التحديثات الهوائية
          shorebird build apk
          
          # إرسال الملف إلى تليجرام فوراً
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          
          echo "🚀 جاري إرسال الـ APK إلى تليجرام..."
          curl -F document=@"$APK_PATH" \
               -F chat_id="$TELEGRAM_CHAT_ID" \
               -F caption="✅ تم بناء نسخة الرفيق الجديدة بنجاح! 🚀" \
               https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument

      - name: Shorebird Patch (Optional)
        script: |
          export PATH="$HOME/.shorebird/bin:$PATH"
          # إذا أردت تحديث النسخ الموجودة عند المستخدمين حالياً
          shorebird patch android --release-version=latest || echo "تخطي الباتش"

    artifacts:
      - build/app/outputs/flutter-apk/*.apk