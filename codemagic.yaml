workflows:
  shorebird-initial-setup:
    name: Shorebird First Time Setup (App ID Generator)
    max_build_duration: 60
    environment:
      groups:
        - deployment # تأكد أن SHOREBIRD_TOKEN موجود في هذا الجروب في Codemagic
      flutter: stable

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install Shorebird CLI
        script: |
          curl --proto '=https' -fLsS https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh -o /tmp/install_shorebird.sh
          bash /tmp/install_shorebird.sh
          export PATH="$HOME/.shorebird/bin:$PATH"
          echo "export PATH=$HOME/.shorebird/bin:$PATH" >> $BASH_ENV

      - name: Shorebird Init and Build
        script: |
          export PATH="$HOME/.shorebird/bin:$PATH"
          
          # التحقق من وجود التوكن
          if [ -z "$SHOREBIRD_TOKEN" ]; then
            echo "❌ خطأ: SHOREBIRD_TOKEN غير موجود في إعدادات Codemagic!"
            exit 1
          fi

          # 1. إنشاء التطبيق في لوحة تحكم Shorebird تلقائياً
          # هذا الأمر سيقوم بإنشاء ملف shorebird.yaml داخل السيرفر
          shorebird init --non-interactive --token "$SHOREBIRD_TOKEN"
          
          # 2. طباعة محتوى الملف لرؤية الـ App ID في الـ Logs
          echo "----------------------------------------"
          echo "✅ تم إنشاء التطبيق بنجاح! هذا هو محتوى ملف shorebird.yaml الجديد:"
          cat shorebird.yaml
          echo "----------------------------------------"
          
          # 3. بناء أول نسخة (Release) ورفعها للسيرفر
          # ملاحظة: أول نسخة يجب أن تكون Release ليتمكن الـ Patch من العمل لاحقاً
          shorebird release android --flutter-version stable --token "$SHOREBIRD_TOKEN" --force

    artifacts:
      - build/app/outputs/flutter-apk/*.apk