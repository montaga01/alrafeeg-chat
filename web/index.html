<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <base href="./">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="الرفيق - تطبيق الدردشة">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="الرفيق">
  <meta name="theme-color" content="#1a56db">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>الرفيق - تطبيق الدردشة</title>
  <style>
    body { background-color: #f0f4ff; margin: 0; }
    #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a56db, #1e429f, #0f2a6e); z-index: 9999; }
    #loading .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div></div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var loader = document.getElementById('loading');
        if (loader) loader.style.display = 'none';
      }, 3000);
    });
  </script>
  <!-- أضف هذا قبل </body> -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('firebase-messaging-sw.js');
    }
  </script>
</body>
</html>
