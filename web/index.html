<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="الرفيق - تطبيق الدردشة">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="الرفيق">
  <meta name="theme-color" content="#10B981">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>الرفيق - تطبيق الدردشة</title>
  <style>
    body { background-color: #0B0D14; margin: 0; }
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      background: linear-gradient(135deg, #0B0D14, #11131C, #0a1a14);
      z-index: 9999;
    }
    #loading .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(16,185,129,0.2);
      border-top-color: #10B981;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading .load-text {
      color: #10B981;
      font-family: sans-serif;
      font-size: 15px;
      font-weight: 600;
      opacity: 0.8;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="load-text">الرفيق</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var loader = document.getElementById('loading');
        if (loader) loader.style.display = 'none';
      }, 3000);
    });
  </script>
</body>
</html>
